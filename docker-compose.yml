services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: musiccerts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d musiccerts"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  seed:
    build:
      context: .
      dockerfile: docker/seed.Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/musiccerts
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - seed

  api:
    build:
      context: ./api
      dockerfile: ../docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/musiccerts?sslmode=disable
      REDIS_URL: redis://redis:6379
      PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
